name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Verify GitHub Pages asset paths
        run: |
          if grep -q "/src/main.tsx" dist/index.html; then
            echo "dist/index.html still points to the Vite source entry instead of built assets." >&2
            exit 1
          fi
          if ! grep -Eq "/(WorkflowsAI)/assets/index-[^\"]+\.js" dist/index.html; then
            echo "dist/index.html does not reference the compiled JS asset under /WorkflowsAI/assets/." >&2
            exit 1
          fi
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
